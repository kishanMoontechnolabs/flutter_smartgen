name: flutter_smartgen_example
description: Example Flutter app to try the flutter_smartgen CLI.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # CLI from the parent package (path: ..)
  flutter_smartgen:
    path: ..

flutter:
  uses-material-design: true
