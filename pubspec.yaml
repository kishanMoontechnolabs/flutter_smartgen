name: flutter_smartgen
description: >-
  CLI that scaffolds Flutter feature-module pages with GetX, registers routes,
  syncs AppImages, and creates environment files. Configure paths via smartgen.yaml.
version: 0.4.0
repository: https://github.com/kishanMoontechnolabs/flutter_smartgen
issue_tracker: https://github.com/kishanMoontechnolabs/flutter_smartgen/issues
homepage: https://github.com/kishanMoontechnolabs/flutter_smartgen

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  args: ^2.7.0
  path: ^1.9.1
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0

executables:
  smartgen: smartgen
