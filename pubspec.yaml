name: flutter_smartgen
description: >-
  CLI that scaffolds Flutter feature-module pages with GetX: barrel, binding,
  controller, repository, model, and view. Configure paths via smartgen.yaml.
version: 0.1.0
repository: https://github.com/kishanMoontechnolabs/flutter_smartgen
issue_tracker: https://github.com/kishanMoontechnolabs/flutter_smartgen/issues
homepage: https://github.com/kishanMoontechnolabs/flutter_smartgen

environment:
  sdk: ^3.10.0

dependencies:
  args: ^2.7.0
  path: ^1.9.1
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0

executables:
  smartgen: smartgen
